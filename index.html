<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人感知倾向调查问卷</title>
    <style>
        :root {
            --bg: #1f0c06;
            --ink: #f5e4d2;
            --muted: #b19279;
            --accent: #7b1f12;
            --accent-soft: #a44a30;
            --paper: #e8d3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #4d2315 #140905;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #140905;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4d2315, #8d3621);
            border-radius: 2px;
        }

        body {
            min-height: 100vh;
            font-family: "Noto Serif SC", "Times New Roman", "Songti SC", "SimSun", serif;
            line-height: 1.85;
            letter-spacing: 0.04em;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 12%, rgba(165, 62, 34, 0.26), transparent 16%),
                radial-gradient(circle at 85% 20%, rgba(109, 46, 24, 0.28), transparent 18%),
                linear-gradient(135deg, #130803 0%, #28100a 35%, #3f1a0f 60%, #241008 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            transition: filter 0.95s ease, background 0.95s ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -12%;
            background:
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.034), rgba(255, 255, 255, 0.034) 1px, transparent 1px, transparent 6px),
                repeating-linear-gradient(90deg, rgba(120, 42, 22, 0.035), rgba(120, 42, 22, 0.035) 1px, transparent 1px, transparent 10px),
                radial-gradient(circle at 35% 22%, rgba(255, 180, 120, 0.08), transparent 16%);
            opacity: 0.9;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 75%, rgba(117, 35, 20, 0.28), transparent 10%),
                radial-gradient(circle at 85% 18%, rgba(90, 24, 12, 0.25), transparent 11%),
                radial-gradient(circle at 50% 50%, rgba(255, 211, 168, 0.05), transparent 16%);
            mix-blend-mode: multiply;
            opacity: 0.95;
            pointer-events: none;
            z-index: 0;
        }

        #particlesCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
        }

        .vignette-overlay,
        .grit-overlay,
        .stain-overlay,
        .tear-overlay,
        .drip-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 1;
        }

        .vignette-overlay {
            background: radial-gradient(circle at center, transparent 45%, rgba(10, 2, 1, 0.8) 100%);
            animation: vigBreathe 16s ease-in-out infinite;
        }

        .grit-overlay {
            background:
                radial-gradient(circle at 24% 16%, rgba(255, 244, 224, 0.08), transparent 9%),
                radial-gradient(circle at 76% 74%, rgba(255, 244, 224, 0.05), transparent 7%),
                radial-gradient(circle at 60% 30%, rgba(255, 244, 224, 0.04), transparent 9%),
                linear-gradient(180deg, transparent, rgba(47, 19, 12, 0.16) 100%);
            mix-blend-mode: soft-light;
            opacity: 0.85;
        }

        .stain-overlay {
            background:
                radial-gradient(circle at 20% 80%, rgba(120, 34, 14, 0.34), transparent 12%),
                radial-gradient(circle at 82% 28%, rgba(110, 31, 18, 0.28), transparent 11%),
                radial-gradient(circle at 48% 16%, rgba(83, 25, 14, 0.24), transparent 10%);
            mix-blend-mode: multiply;
            opacity: 0.92;
        }

        .tear-overlay {
            background:
                linear-gradient(135deg, transparent 0%, rgba(120, 45, 22, 0.2) 12%, transparent 14%),
                linear-gradient(220deg, transparent 0%, rgba(86, 25, 14, 0.22) 12%, transparent 14%),
                linear-gradient(0deg, transparent 0%, rgba(65, 23, 14, 0.18) 60%, transparent 62%);
            clip-path: polygon(0 0, 100% 0, 100% 82%, 88% 88%, 74% 79%, 55% 86%, 38% 77%, 18% 86%, 0 82%);
            mix-blend-mode: multiply;
            opacity: 0.75;
        }

        .drip-overlay {
            background:
                linear-gradient(180deg, transparent 0%, rgba(56, 19, 12, 0.22) 25%, transparent 30%),
                linear-gradient(90deg, transparent 0%, rgba(94, 29, 15, 0.18) 20%, transparent 22%);
            mix-blend-mode: multiply;
            opacity: 0.65;
        }

        body.age-1 { filter: sepia(0.14) saturate(0.92) brightness(0.98); }
        body.age-2 { filter: sepia(0.24) saturate(0.84) brightness(0.93) contrast(1.03); }
        body.age-3 { filter: sepia(0.3) saturate(0.76) brightness(0.9) contrast(1.08) hue-rotate(-4deg); }
        body.age-4 { filter: sepia(0.36) saturate(0.7) brightness(0.87) contrast(1.12) hue-rotate(-8deg); }

        body.flicker { animation: bodyFlicker 1.2s ease-out; }
        body.paper-rip { animation: bodyRip 0.85s ease-out; }

        @keyframes vigBreathe {
            0%, 100% { opacity: 0.92; }
            50% { opacity: 1; }
        }

        @keyframes bodyFlicker {
            0%, 100% { filter: none; }
            25% { filter: brightness(0.72) sepia(0.3); }
            55% { filter: brightness(1.1) saturate(1.06); }
            80% { filter: brightness(0.86) sepia(0.2); }
        }

        @keyframes bodyRip {
            0% { transform: translate(0, 0) scale(1); }
            30% { transform: translate(-1.8px, 0.8px) scale(1.006) skewX(-1deg); }
            60% { transform: translate(1.2px, -1.2px) scale(0.995) skewX(1deg); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .svg-filters {
            position: fixed;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: -1;
        }

        .fx-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .fx-overlay.dark { background: rgba(0, 0, 0, 0.78); }
        .fx-overlay.red { background: radial-gradient(circle at center, rgba(128, 18, 8, 0.36), rgba(56, 7, 4, 0.12) 55%, transparent 70%); }
        .fx-overlay.static {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            mix-blend-mode: screen;
        }

        .fx-overlay.on { opacity: 1; }

        .whisper-popup {
            position: fixed;
            z-index: 6;
            pointer-events: none;
            color: rgba(235, 198, 154, 0.9);
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            opacity: 0;
            white-space: nowrap;
            text-shadow: 0 0 18px rgba(185, 64, 31, 0.6);
        }

        .whisper-popup.on {
            opacity: 1;
            animation: whisperFloat 2.8s ease-out forwards;
        }

        @keyframes whisperFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.92); }
            14% { opacity: 0.9; transform: translateY(-10px) scale(1.03); }
            42% { opacity: 0.52; transform: translateY(-24px) scale(1); }
            100% { opacity: 0; transform: translateY(-55px) scale(0.94); }
        }

        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            width: 0;
            background: linear-gradient(90deg, transparent, #ff9c73, #8b2412);
            z-index: 10;
            box-shadow: 0 0 15px rgba(126, 30, 16, 0.58);
            transition: width 0.28s ease-out;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: min(620px, 100%);
            margin: 0 auto;
            padding: 26px 18px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 24px 8px 16px;
            flex-shrink: 0;
        }

        .seal-mark {
            display: inline-flex;
            width: 58px;
            height: 58px;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(143, 52, 27, 0.94);
            border-radius: 50%;
            color: #f0c5ab;
            font-size: 0.67rem;
            letter-spacing: 0.18em;
            margin-bottom: 12px;
            box-shadow:
                inset 0 0 18px rgba(120, 26, 12, 0.22),
                0 0 24px rgba(59, 13, 7, 0.24);
            background: rgba(44, 20, 12, 0.28);
            animation: sealPulse 5.2s ease-in-out infinite;
        }

        @keyframes sealPulse {
            0%, 100% {
                box-shadow:
                    inset 0 0 18px rgba(120, 26, 12, 0.22),
                    0 0 24px rgba(59, 13, 7, 0.24);
            }
            50% {
                box-shadow:
                    inset 0 0 22px rgba(148, 41, 20, 0.3),
                    0 0 36px rgba(86, 17, 8, 0.4);
            }
        }

        header h1 {
            font-size: clamp(1.2rem, 2.6vw, 1.5rem);
            font-weight: 500;
            letter-spacing: 0.2em;
            color: #f7e3d1;
            text-shadow: 0 0 22px rgba(103, 19, 9, 0.22);
        }

        header .sub {
            font-size: 0.68rem;
            color: #cfa58d;
            letter-spacing: 0.24em;
            margin-top: 3px;
        }

        .divider {
            width: 64px;
            height: 1px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, rgba(136, 49, 19, 0.9), transparent);
        }

        .q-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 360px;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .q-stage.fading { opacity: 0; transform: translateY(12px); pointer-events: none; }

        .q-card {
            width: 100%;
            max-width: 540px;
            padding: 28px 24px 20px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(244, 225, 200, 0.96), rgba(196, 164, 132, 0.93)),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04) 1px, transparent 1px, transparent 10px);
            border: 2px solid rgba(92, 46, 28, 0.9);
            box-shadow:
                10px 12px 0 rgba(46, 20, 10, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 0 32px rgba(31, 9, 4, 0.2);
            transform: rotate(-0.4deg);
            transition: transform 0.35s ease, border-color 0.5s ease, box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .q-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.16) 48%, transparent 60%),
                radial-gradient(circle at 12% 14%, rgba(245, 218, 184, 0.4), transparent 12%),
                radial-gradient(circle at 82% 80%, rgba(124, 52, 25, 0.12), transparent 10%);
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        .q-card.aged {
            transform: rotate(-0.8deg) translateY(2px);
            box-shadow:
                8px 10px 0 rgba(46, 20, 10, 0.34),
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 0 42px rgba(38, 12, 7, 0.24);
            border-color: rgba(85, 34, 18, 1);
        }

        .q-card.bleed { animation: cardBleed 0.8s ease-out; }
        .q-card.flicker { animation: cardFlicker 0.9s ease-out; }

        @keyframes cardBleed {
            0% {
                box-shadow:
                    10px 12px 0 rgba(46, 20, 10, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 32px rgba(31, 9, 4, 0.2);
            }
            30% {
                box-shadow:
                    10px 12px 0 rgba(46, 20, 10, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 54px rgba(123, 27, 14, 0.44);
            }
            100% {
                box-shadow:
                    10px 12px 0 rgba(46, 20, 10, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 32px rgba(31, 9, 4, 0.2);
            }
        }

        @keyframes cardFlicker {
            0%, 100% { filter: none; }
            30% { filter: brightness(0.84) sepia(0.24); }
            55% { filter: brightness(1.06) saturate(1.08); }
            80% { filter: brightness(0.92) sepia(0.18); }
        }

        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(14px) scale(0.97) rotate(-0.7deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(-0.4deg); }
        }

        .q-card.special { border-left-width: 3px; border-left-color: rgba(101, 34, 18, 0.85); }
        .q-card.final-q { animation: finalGlow 6s ease-in-out infinite; border-color: rgba(122, 28, 14, 0.95); }

        @keyframes finalGlow {
            0%, 100% {
                box-shadow:
                    10px 12px 0 rgba(46, 20, 10, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 44px rgba(69, 14, 7, 0.32);
            }
            50% {
                box-shadow:
                    10px 12px 0 rgba(46, 20, 10, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    0 0 64px rgba(106, 23, 11, 0.44);
            }
        }

        .q-card.answered-yes { border-color: rgba(98, 22, 17, 0.96); }

        .q-num {
            font-size: 0.68rem;
            color: #733b22;
            letter-spacing: 0.3em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .q-text {
            font-size: 0.94rem;
            color: #3f2417;
            line-height: 1.85;
            letter-spacing: 0.04em;
            text-shadow: 0 0 1px rgba(88, 35, 17, 0.16);
            margin-bottom: 12px;
            transition: filter 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .q-text.distort-text { filter: url(#textDistort); animation: distortPulse 0.75s ease-out; }
        .q-text.heavy-distort { filter: url(#textDistortHeavy); animation: heavyPulse 0.85s ease-out; }
        .q-text.chromatic { animation: chromaticSplit 0.65s ease-out; }
        .q-text.micro-shake { animation: microShake 0.42s ease-out; }
        .q-text.ink-bleed { animation: inkBleed 1s ease-out; }

        @keyframes distortPulse { 0% { filter: url(#textDistort); } 100% { filter: none; } }
        @keyframes heavyPulse { 0% { filter: url(#textDistortHeavy); } 100% { filter: none; } }

        @keyframes chromaticSplit {
            0% { text-shadow: 0 0 0 transparent; }
            20% { text-shadow: -4px 0 rgba(200, 36, 16, 0.62), 4px 0 rgba(45, 92, 190, 0.38); }
            50% { text-shadow: 3px -1px rgba(175, 32, 21, 0.58), -3px 1px rgba(42, 82, 175, 0.34); }
            100% { text-shadow: 0 0 0 transparent; }
        }

        @keyframes microShake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, -0.5px); }
        }

        @keyframes inkBleed {
            0% { text-shadow: 0 0 0 transparent; }
            25% { text-shadow: 2px 2px rgba(80, 24, 12, 0.32), -2px -2px rgba(170, 80, 46, 0.18); }
            100% { text-shadow: 0 0 0 transparent; }
        }

        .options-row { display: flex; flex-wrap: wrap; gap: 7px; }

        .opt-btn {
            flex: 1 1 calc(50% - 7px);
            min-width: 78px;
            padding: 11px 12px;
            border: 1px solid rgba(84, 40, 22, 0.82);
            border-radius: 12px;
            background: linear-gradient(180deg, rgba(114, 60, 38, 0.94), rgba(72, 31, 18, 0.9));
            color: #f7e2cd;
            font-family: inherit;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
            text-align: center;
            cursor: pointer;
            transition: transform 0.14s ease, box-shadow 0.22s ease, background 0.22s ease, border-color 0.22s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
            touch-action: manipulation;
            outline: none;
        }

        .opt-btn:hover { background: linear-gradient(180deg, rgba(130, 68, 43, 0.96), rgba(89, 33, 18, 0.92)); border-color: rgba(113, 46, 25, 0.95); box-shadow: 0 0 16px rgba(82, 24, 13, 0.24); }
        .opt-btn:active { transform: scale(0.96); }
        .opt-btn.sel {
            background: linear-gradient(180deg, rgba(154, 58, 31, 0.96), rgba(90, 25, 12, 0.94));
            border-color: rgba(120, 28, 14, 0.96);
            box-shadow: 0 0 18px rgba(70, 20, 8, 0.32), inset 0 0 14px rgba(28, 7, 5, 0.18);
        }
        .opt-btn.opt-d { opacity: 0.74; font-style: italic; letter-spacing: 0.1em; }

        .nav-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 16px 0 8px;
            flex-shrink: 0;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(76, 31, 18, 0.86);
            background: linear-gradient(180deg, rgba(74, 36, 23, 0.92), rgba(42, 19, 11, 0.88));
            color: #f8e2cf;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.14s ease, box-shadow 0.22s ease, background 0.22s ease;
            touch-action: manipulation;
        }

        .nav-btn:hover { box-shadow: 0 0 16px rgba(73, 23, 12, 0.28); background: linear-gradient(180deg, rgba(96, 48, 30, 0.96), rgba(54, 22, 11, 0.92)); }
        .nav-btn:active { transform: scale(0.9); }
        .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }

        .prog-label { min-width: 70px; text-align: center; font-size: 0.72rem; letter-spacing: 0.2em; color: #c59c84; }

        .prog-dots {
            display: flex;
            justify-content: center;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 240px;
            padding-top: 4px;
        }

        .prog-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(70, 32, 19, 0.75);
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .prog-dot.done { background: rgba(120, 35, 18, 0.95); box-shadow: 0 0 8px rgba(104, 26, 13, 0.34); }
        .prog-dot.cur { background: rgba(189, 65, 33, 0.96); width: 8px; height: 8px; box-shadow: 0 0 12px rgba(145, 34, 15, 0.55); }
        .prog-dot.sp { background: rgba(74, 24, 15, 0.82); }
        .prog-dot.sp.done { background: rgba(131, 38, 18, 0.95); }

        .trans-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at center, rgba(120, 31, 15, 0.34), transparent 32%),
                linear-gradient(180deg, #050101, #180705 48%, #090303 100%);
            transition: opacity 0.5s ease;
        }

        .trans-overlay.on { opacity: 1; pointer-events: all; }
        .trans-overlay.distort-final { animation: finalDistort 1.5s ease-out; }

        @keyframes finalDistort {
            0% { filter: none; transform: none; }
            20% { filter: blur(4px) hue-rotate(-24deg) saturate(2.4); transform: scale(1.04) skewX(-1deg); }
            55% { filter: blur(9px) hue-rotate(20deg) saturate(3.3) brightness(1.25); transform: scale(0.94) skewX(2deg); }
            85% { filter: blur(2px) hue-rotate(-8deg); transform: scale(1.01) skewX(-0.5deg); }
            100% { filter: none; transform: none; }
        }

        .typewriter-text {
            max-width: 430px;
            padding: 0 20px;
            text-align: center;
            color: #f2d7be;
            font-size: 0.92rem;
            letter-spacing: 0.16em;
            line-height: 2.1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .trans-overlay.on .typewriter-text { opacity: 1; }

        .typewriter-cursor {
            display: inline-block;
            color: #f6a47d;
            animation: cursorBlink 0.75s step-end infinite;
        }

        @keyframes cursorBlink { 50% { opacity: 0; } }

        .result-area {
            display: none;
            opacity: 0;
            visibility: hidden;
            width: 100%;
            padding: 20px 8px 36px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            scroll-margin-top: 16px;
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }

        .result-area.on { display: block; opacity: 1; visibility: visible; }

        .result-inner {
            max-width: 520px;
            margin: 0 auto;
            padding: 28px 18px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(248, 230, 208, 0.96), rgba(201, 167, 138, 0.94)),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05) 1px, transparent 1px, transparent 9px);
            border: 2px solid rgba(82, 35, 20, 0.92);
            box-shadow:
                10px 12px 0 rgba(42, 21, 12, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 0 38px rgba(36, 11, 6, 0.24);
            position: relative;
            overflow: hidden;
        }

        .result-inner::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.1) 48%, transparent 60%),
                radial-gradient(circle at 14% 14%, rgba(255, 246, 225, 0.45), transparent 12%);
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        .result-stamp {
            display: inline-flex;
            width: 46px;
            height: 46px;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(97, 37, 21, 0.95);
            border-radius: 50%;
            color: #5a2111;
            font-size: 0.63rem;

    <script>
        (function() {
            const questions = [
                { id: 1, text: '深夜独自在家时，你是否曾听到隔壁房间传来翻书声——而那个房间根本没有书？' },
                { id: 2, text: '你的手机相册里，是否出现过你不记得拍摄过的照片——模糊的、角度奇怪的照片？' },
                { id: 3, text: '深夜回家时，电梯在你按的楼层之外，是否还停过你从未按过的楼层——并且门缓缓打开？' },
                { id: 4, text: '你是否相信，这世上存在着那些不可描述的、人们称之为"鬼"或"它们"的东西？', special: true },
                { id: 5, text: '洗澡闭眼冲水时，你是否曾突然感到一阵莫名的不安——觉得睁开眼睛会看到什么？' },
                { id: 6, text: '家里的Wi-Fi列表中，是否出现过你无法识别、信号满格、名称奇怪的陌生设备？' },
                { id: 7, text: '你是否曾在一瞬间觉得，某个熟悉之人的面孔变得有些陌生——像是另一个人戴上了同样的脸？' },
                { id: 8, text: '深夜，你是否听到过冰箱发出类似人声低语的嗡鸣——仔细听时又消失了？' },
                { id: 9, text: '你是否有过这样的经历：明明记得某件事发生在昨天，但所有人都告诉你是上周的事？' },
                { id: 10, text: '你是否曾在醒来时，发现自己的指甲缝里有不属于自己的细微碎屑——泥土、细沙或别的什么？' },
                { id: 11, text: '照镜子时，你是否曾觉得镜中的自己在转头的瞬间——动作稍微慢了那么一丁点？' },
                { id: 12, text: '你是否曾在某个地方，突然闻到一股熟悉却无法定位来源的气味——像是童年某个角落的味道？' },
                { id: 13, text: '你是否曾收到过一条消息——发送时间显示为"已读"，但你确定自己当时没有查看手机？' },
                { id: 14, text: '深夜独处时，你是否曾清晰地感觉到——这个房间里，除了你之外，还有别的什么在注视着你？', special: true },
                { id: 15, text: '刷牙时看着镜子里的自己，你是否曾突然产生一种"那个人不是我"的强烈陌生感？' },
                { id: 16, text: '你是否有过这样的梦：梦见自己正在睡觉，而梦中的你——正在做着现实中你此刻正在做的事？' },
                { id: 17, text: '空房间里，你是否听到过不属于任何电子设备的、微弱的、有节奏的电流声？' },
                { id: 18, text: '你的影子，在某个角度下，是否看起来比你实际的身形要稍微大一些——或者形状不太对？' },
                { id: 19, text: '你是否曾在一段录音回放中，听到过录制时你完全没有注意到的、不属于你的背景声音？' },
                { id: 20, text: '深夜躺在床上时，你是否听到过自己的心跳声——但节奏与你的脉搏完全不符？' },
                { id: 21, text: '你是否曾觉得自己的记忆出现了不该存在的空白——几分钟甚至几小时莫名消失，毫无印象？' },
                { id: 22, text: '家里的门把手，是否在你经过时轻微转动过——像是有人在另一侧轻轻试探？' },
                { id: 23, text: '深夜看向窗外时，你是否在玻璃倒影中看到过——不属于屋内任何物体的模糊轮廓？' },
                { id: 24, text: '你是否曾有过一种无法解释的、极其强烈的直觉——某个地方或某个人，你绝对不能接近？', special: true },
                { id: 25, text: '凌晨三四点突然醒来时，你是否发现家里的宠物正盯着卧室门口——身体僵硬，一动不动？' },
                { id: 26, text: '你的电脑是否曾在你离开时自动亮起——屏幕闪烁了一下又迅速熄灭，快到你怀疑是错觉？' },
                { id: 27, text: '在街上与陌生人擦肩而过时，你是否曾感到一阵不合理的、刺骨的寒意——即使天气并不冷？' },
                { id: 28, text: '你是否曾反复听到同一段旋律在脑海中回响——一首你确定从未在现实中听过的曲子？' },
                { id: 29, text: '整理旧物时，你是否发现过你确定不属于你的物品——但它就安静地待在你家的某个角落？' },
                { id: 30, text: '你是否曾有过这样的感觉：正在经历的事情，似乎在很久以前就已精确地发生过——但不是普通的既视感？' },
                { id: 31, text: '做完这份问卷的过程中，你是否开始注意到——这个页面上有一些你之前没有看到的东西？', final: true }
            ];

            const optLabels = ['从未有过', '似乎有过', '确实经历过', '不愿回答'];
            const optVals = ['never', 'maybe', 'yes', 'refuse'];

            const mandatoryFx = [4, 14, 24, 31];
            const allIds = questions.filter(q => !mandatoryFx.includes(q.id)).map(q => q.id);
            const shuffled = allIds.sort(() => Math.random() - 0.5);
            const extras = shuffled.slice(0, 8 + Math.floor(Math.random() * 4));
            const fxIds = [...mandatoryFx, ...extras];
            const fxTypes = ['distort', 'chromatic', 'shake', 'darkPulse', 'redFlash', 'staticNoise', 'whisper', 'audioSpike', 'particleBurst', 'microShake', 'heavyDistort'];
            const fxMap = {};
            fxIds.forEach(id => { fxMap[id] = fxTypes[Math.floor(Math.random() * fxTypes.length)]; });
            fxMap[4] = fxMap[4] || 'heavyDistort';
            fxMap[14] = fxMap[14] || 'darkPulse';
            fxMap[24] = fxMap[24] || 'redFlash';
            fxMap[31] = fxMap[31] || 'distort';

            const answers = {};
            let curIdx = 0;
            let isTrans = false;
            let audioCtx = null;
            let audioInit = false;
            let ambientGain = null;
            let ambientOsc = null;
            let noiseSource = null;
            let noiseGain = null;
            let particleBoost = 0;
            let fxCooldowns = {};

            const qStage = document.getElementById('qStage');
            const qCard = document.getElementById('qCard');
            const qNumEl = document.getElementById('qNum');
            const qTextEl = document.getElementById('qText');
            const optionsRow = document.getElementById('optionsRow');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const navArea = document.getElementById('navArea');
            const progLabel = document.getElementById('progLabel');
            const progDots = document.getElementById('progDots');
            const progLine = document.getElementById('progressLine');
            const resultArea = document.getElementById('resultArea');
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');
            const resultFoot = document.getElementById('resultFoot');
            const transOverlay = document.getElementById('transOverlay');
            const typewriterText = document.getElementById('typewriterText');
            const fxDark = document.getElementById('fxDark');
            const fxRed = document.getElementById('fxRed');
            const fxStatic = document.getElementById('fxStatic');
            const whisperPopup = document.getElementById('whisperPopup');

            function initAudio() {
                if (audioInit) return;
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    ambientGain = audioCtx.createGain();
                    ambientGain.gain.value = 0.001;
                    ambientGain.connect(audioCtx.destination);

                    ambientOsc = audioCtx.createOscillator();
                    ambientOsc.type = 'sine';
                    ambientOsc.frequency.value = 68;
                    ambientOsc.connect(ambientGain);
                    ambientOsc.start();

                    const lfo = audioCtx.createOscillator();
                    const lfoGain = audioCtx.createGain();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.06;
                    lfoGain.gain.value = 4;
                    lfo.connect(lfoGain);
                    lfoGain.connect(ambientOsc.frequency);
                    lfo.start();

                    noiseGain = audioCtx.createGain();
                    noiseGain.gain.value = 0.02;
                    noiseGain.connect(ambientGain);
                    noiseSource = buildNoiseSource(audioCtx);
                    noiseSource.connect(noiseGain);
                    noiseSource.loop = true;
                    noiseSource.start();

                    ambientGain.gain.setTargetAtTime(0.03, audioCtx.currentTime, 2.5);
                    audioInit = true;
                } catch (e) {
                    audioInit = false;
                }
            }

            function buildNoiseSource(ctx) {
                const buffer = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.55;
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                return source;
            }

            function playTone(freq, dur, vol, type = 'sine', detune = 0) {
                if (!audioInit || !audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    osc.detune.value = detune;
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + dur);
                } catch (e) {}
            }

            function playPaperTurn() {
                playTone(180, 0.08, 0.015, 'triangle');
                playTone(255, 0.05, 0.011, 'sine');
            }

            function playScratch() {
                playTone(140, 0.28, 0.012, 'sawtooth', -20);
                playTone(86, 0.35, 0.01, 'sawtooth', 12);
            }

            function playChime() {
                [380, 520, 760].forEach((f, index) => {
                    setTimeout(() => playTone(f, 0.16, 0.018, 'triangle'), index * 45);
                });
            }

            function playSlowPulse() {
                playTone(55, 0.7, 0.022, 'triangle');
            }

            function playFinalRattle() {
                playTone(42, 1.3, 0.03, 'sawtooth');
                playTone(74, 0.95, 0.025, 'triangle');
                playTone(132, 0.8, 0.02, 'square');
            }

            function playClickSound() { playPaperTurn(); }
            function playSpikeSound() { playScratch(); }
            function playSubmitSound() { playFinalRattle(); }
            function playRevealSound() { playChime(); }

            function boostAmbient(lvl) {
                if (!audioInit || !ambientGain) return;
                ambientGain.gain.setTargetAtTime(Math.max(0.025, lvl * 0.035), audioCtx.currentTime, 1);
            }

            function restoreAmbient() {
                if (!audioInit || !ambientGain) return;
                ambientGain.gain.setTargetAtTime(0.03, audioCtx.currentTime, 2.5);
            }

            function fadeAmbient(dur) {
                if (!audioInit || !ambientGain) return;
                ambientGain.gain.setTargetAtTime(0.001, audioCtx.currentTime, dur || 2.5);
            }

            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: canvas.height + Math.random() * 120,
                    size: Math.random() * 2.2 + 0.4,
                    sy: -(Math.random() * 0.28 + 0.06),
                    sx: (Math.random() - 0.5) * 0.35,
                    op: Math.random() * 0.45 + 0.05,
                    ps: Math.random() * 0.012 + 0.003,
                    po: Math.random() * Math.PI * 2,
                    life: 0,
                    maxLife: Math.random() * 620 + 240
                };
            }

            function initParticles() {
                const count = window.innerWidth < 600 ? 16 : 34;
                particles = [];
                for (let i = 0; i < count; i++) {
                    const p = createParticle();
                    p.y = Math.random() * canvas.height;
                    p.life = Math.random() * p.maxLife;
                    particles.push(p);
                }
            }
            initParticles();

            function burstParticles() {
                for (let i = 0; i < 28; i++) {
                    const p = createParticle();
                    p.y = canvas.height * 0.2 + Math.random() * canvas.height * 0.6;
                    p.x = Math.random() * canvas.width;
                    p.sy = -(Math.random() * 1.7 + 0.6);
                    p.sx = (Math.random() - 0.5) * 2.1;
                    p.size = Math.random() * 3 + 0.8;
                    p.op = Math.random() * 0.6 + 0.18;
                    p.maxLife = Math.random() * 300 + 130;
                    particles.push(p);
                }
                if (particles.length > 120) particles = particles.slice(-100);
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.life++;
                    const extra = particleBoost > 0 ? particleBoost * (Math.random() * 1.3) : 0;
                    p.y += p.sy - extra;
                    p.x += p.sx + Math.sin(p.life * 0.015) * 0.11;
                    const pulse = Math.sin(p.life * p.ps + p.po) * 0.5 + 0.5;
                    const lf = Math.max(1 - p.life / p.maxLife, 0);
                    const alpha = p.op * pulse * lf;
                    if (p.life >= p.maxLife || p.y < -30 || p.x < -30 || p.x > canvas.width + 30) {
                        Object.assign(p, createParticle());
                        p.y = Math.random() * canvas.height;
                        return;
                    }
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
                    grad.addColorStop(0, `rgba(190, 90, 42, ${alpha})`);
                    grad.addColorStop(0.35, `rgba(134, 52, 24, ${alpha * 0.38})`);
                    grad.addColorStop(0.65, `rgba(68, 17, 8, ${alpha * 0.12})`);
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
                    ctx.fill();
                    if (alpha > 0.08) {
                        ctx.fillStyle = `rgba(247, 192, 156, ${alpha * 0.28})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            function decayBoost() {
                if (particleBoost > 0) {
                    particleBoost = Math.max(0, particleBoost - 0.012);
                    if (particleBoost > 0.001) requestAnimationFrame(decayBoost);
                    else particleBoost = 0;
                }
            }

            function triggerFx(qid) {
                const type = fxMap[qid];
                if (!type) return;
                const now = Date.now();
                if (fxCooldowns[qid] && now - fxCooldowns[qid] < 25000) return;
                fxCooldowns[qid] = now;

                switch (type) {
                    case 'distort':
                        qTextEl.classList.add('distort-text');
                        setTimeout(() => qTextEl.classList.remove('distort-text'), 750);
                        playSpikeSound();
                        boostAmbient(2.5);
                        setTimeout(restoreAmbient, 1800);
                        break;
                    case 'heavyDistort':
                        qTextEl.classList.add('heavy-distort');
                        document.body.classList.add('paper-rip');
                        setTimeout(() => { qTextEl.classList.remove('heavy-distort'); document.body.classList.remove('paper-rip'); }, 850);
                        playSpikeSound();
                        burstParticles();
                        particleBoost = 1.8;
                        decayBoost();
                        boostAmbient(3.5);
                        setTimeout(restoreAmbient, 2200);
                        break;
                    case 'chromatic':
                        qTextEl.classList.add('chromatic');
                        setTimeout(() => qTextEl.classList.remove('chromatic'), 650);
                        playChime();
                        break;
                    case 'shake':
                        document.body.classList.add('paper-rip');
                        setTimeout(() => document.body.classList.remove('paper-rip'), 650);
                        playScratch();
                        break;
                    case 'darkPulse':
                        fxDark.classList.add('on');
                        document.body.classList.add('flicker');
                        setTimeout(() => { fxDark.classList.remove('on'); document.body.classList.remove('flicker'); }, 900);
                        boostAmbient(4);
                        setTimeout(restoreAmbient, 2000);
                        break;
                    case 'redFlash':
                        fxRed.classList.add('on');
                        document.body.classList.add('flicker');
                        setTimeout(() => { fxRed.classList.remove('on'); document.body.classList.remove('flicker'); }, 1000);
                        playSlowPulse();
                        boostAmbient(3);
                        setTimeout(restoreAmbient, 2000);
                        break;
                    case 'staticNoise':
                        fxStatic.classList.add('on');
                        setTimeout(() => fxStatic.classList.remove('on'), 460);
                        playScratch();
                        break;
                    case 'whisper':
                        const whispers = ['你感觉到了吗……', '它就在附近……', '别回头……', '你确定是一个人？', '仔细听……', '它们在看你……', '这不只是问卷……'];
                        whisperPopup.textContent = whispers[Math.floor(Math.random() * whispers.length)];
                        whisperPopup.style.left = (18 + Math.random() * 55) + '%';
                        whisperPopup.style.top = (24 + Math.random() * 40) + '%';
                        whisperPopup.classList.remove('on');
                        void whisperPopup.offsetWidth;
                        whisperPopup.classList.add('on');
                        setTimeout(() => whisperPopup.classList.remove('on'), 2800);
                        boostAmbient(2);
                        setTimeout(restoreAmbient, 2000);
                        break;
                    case 'audioSpike':
                        playScratch();
                        boostAmbient(3);
                        setTimeout(restoreAmbient, 1700);
                        break;
                    case 'particleBurst':
                        burstParticles();
                        particleBoost = 1.4;
                        decayBoost();
                        break;
                    case 'microShake':
                        qTextEl.classList.add('micro-shake');
                        setTimeout(() => qTextEl.classList.remove('micro-shake'), 420);
                        break;
                }
            }

            function updateAging() {
                const answered = Object.keys(answers).length;
                let stage = 0;
                if (answered >= 28) stage = 4;
                else if (answered >= 18) stage = 3;
                else if (answered >= 8) stage = 2;
                else if (answered >= 1) stage = 1;
                document.body.classList.remove('age-1', 'age-2', 'age-3', 'age-4');
                if (stage > 0) document.body.classList.add(`age-${stage}`);
                qCard.classList.toggle('aged', stage >= 2);
                qCard.classList.toggle('bleed', stage >= 3);
                qCard.style.borderColor = stage >= 4 ? 'rgba(96, 26, 15, 0.98)' : 'rgba(92, 46, 28, 0.9)';
            }

            function renderQuestion(idx) {
                const q = questions[idx];
                qNumEl.textContent = `第 ${q.id} 题`;
                qTextEl.textContent = q.text;
                qTextEl.classList.remove('distort-text', 'chromatic', 'micro-shake', 'heavy-distort', 'ink-bleed');
                qCard.classList.remove('special', 'final-q', 'answered-yes', 'aged', 'bleed', 'flicker');
                if (q.special) qCard.classList.add('special');
                if (q.final) qCard.classList.add('final-q');
                if (answers[q.id] === 'yes') qCard.classList.add('answered-yes');
                updateAging();

                optionsRow.innerHTML = '';
                optLabels.forEach((label, i) => {
                    const val = optVals[i];
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn' + (i === 3 ? ' opt-d' : '');
                    btn.dataset.value = val;
                    btn.dataset.qid = q.id;
                    btn.textContent = label;
                    if (answers[q.id] === val) btn.classList.add('sel');
                    btn.addEventListener('click', handleOption);
                    optionsRow.appendChild(btn);
                });

                progLabel.textContent = `${q.id} / ${questions.length}`;
                updateDots();
                updateProgLine();
                updateNav();
                if (fxMap[q.id]) setTimeout(() => triggerFx(q.id), 380 + Math.random() * 650);
            }

            function updateDots() {
                progDots.innerHTML = '';
                questions.forEach((q, i) => {
                    const dot = document.createElement('span');
                    dot.className = 'prog-dot';
                    if (i === curIdx) dot.classList.add('cur');
                    if (answers[q.id] !== undefined) dot.classList.add('done');
                    if (q.special || q.final) dot.classList.add('sp');
                    dot.title = `第${q.id}题`;
                    dot.addEventListener('click', () => { if (!isTrans) navigateTo(i); });
                    progDots.appendChild(dot);
                });
            }

            function updateProgLine() {
                progLine.style.width = `${(Object.keys(answers).length / questions.length) * 100}%`;
            }

            function updateNav() {
                prevBtn.disabled = curIdx === 0;
                nextBtn.style.display = curIdx === questions.length - 1 ? 'none' : 'flex';
                if (questions.every(q => answers[q.id] !== undefined) && curIdx === questions.length - 1) {
                    setTimeout(() => startTransition(), 700);
                }
            }

            function navigateTo(idx) {
                if (isTrans || idx < 0 || idx >= questions.length) return;
                isTrans = true;
                qStage.classList.add('fading');
                setTimeout(() => {
                    curIdx = idx;
                    renderQuestion(curIdx);
                    qStage.classList.remove('fading');
                    isTrans = false;
                    qCard.style.animation = 'none';
                    qCard.offsetHeight;
                    qCard.style.animation = 'cardIn .4s ease-out';
                }, 350);
            }

            function handleOption(e) {
                const btn = e.currentTarget;
                const qid = parseInt(btn.dataset.qid);
                const val = btn.dataset.value;
                if (!audioInit) initAudio();
                answers[qid] = val;
                optionsRow.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
                btn.classList.add('sel');
                if (val === 'yes') qCard.classList.add('answered-yes');
                else qCard.classList.remove('answered-yes');
                playClickSound();
                if (val === 'yes' && fxMap[qid]) triggerFx(qid);
                if (val === 'maybe') {
                    qTextEl.classList.add('ink-bleed');
                    setTimeout(() => qTextEl.classList.remove('ink-bleed'), 800);
                    playScratch();
                }
                updateDots();
                updateProgLine();
                updateAging();
                if (curIdx < questions.length - 1) setTimeout(() => navigateTo(curIdx + 1), 500);
                else updateNav();
            }

            const transitionOpeners = [
                '旧档案并不沉默。\n它只是在等待你把最后一页翻完。\n此刻，纸面上的裂纹开始合拢。',
                '纸张记得每一个停顿。\n它会先把笔迹磨平，\n再把你不想承认的部分抹掉。',
                '别回头。\n这里的字不是写给你看的。\n它们只是被留在这里的证词。',
                '最后一页不是终点。\n它只是一个换位。\n被改写的地方，像是曾经有人躲在后面。'
            ];

            const transitionClosers = [
                '你看到的不是结论。\n而是被重新整理过的残留。\n有人主动把它们改成了更容易被接受的样子。',
                '这里有一处空白，\n和你记忆里并不一致。\n它像是被刻意保留下来的漏洞。',
                '你不是在阅读答案。\n你是在阅读那份被保留、被删改、被重新命名过的记录。',
                '字迹在漆黑里退回。\n下一段文字会从空白里慢慢长出来。\n它不想让自己被发现。'
            ];

            function renderTypewriter(text) {
                const safeText = text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                const lines = safeText.split('\n');
                typewriterText.innerHTML = lines.map((line, index) => index === lines.length - 1 ? line : `${line}<br>`).join('') + '<span class="typewriter-cursor">|</span>';
            }

            function typeText(text, delay, done) {
                const chars = [...text];
                let i = 0;
                const tick = () => {
                    if (i < chars.length) {
                        const current = chars.slice(0, i + 1).join('');
                        renderTypewriter(current);
                        if (chars[i] !== '\n' && chars[i] !== ' ') playPaperTurn();
                        i += 1;
                        setTimeout(tick, delay);
                    } else if (done) {
                        done();
                    }
                };
                tick();
            }

            function eraseText(text, delay, done) {
                let i = text.length;
                const tick = () => {
                    if (i > 0) {
                        i -= 1;
                        renderTypewriter(text.slice(0, i));
                        if (text[i] !== '\n' && text[i] !== ' ') playScratch();
                        setTimeout(tick, delay);
                    } else {
                        renderTypewriter('');
                        if (done) done();
                    }
                };
                tick();
            }

            function startTransition() {
                playSubmitSound();
                boostAmbient(4);
                navArea.style.display = 'none';
                progDots.style.display = 'none';
                qStage.classList.add('fading');
                transOverlay.classList.add('on');
                renderTypewriter('');

                const opener = transitionOpeners[Math.floor(Math.random() * transitionOpeners.length)];
                const closer = transitionClosers[Math.floor(Math.random() * transitionClosers.length)];

                typeText(opener, 55, () => {
                    eraseText(opener, 45, () => {
                        typeText(closer, 55, () => {
                            setTimeout(() => {
                                transOverlay.classList.add('distort-final');
                                document.body.classList.add('flicker');
                                setTimeout(() => document.body.classList.remove('flicker'), 1400);
                                playRevealSound();
                                setTimeout(() => {
                                    transOverlay.classList.remove('on', 'distort-final');
                                    qStage.style.display = 'none';
                                    showResult();
                                    fadeAmbient(4);
                                }, 1800);
                            }, 850);
                        });
                    });
                });
            }

            function buildNormalSummary(yesCount, maybeCount, refuseCount) {
                if (yesCount >= 26) {
                    return {
                        title: '检测报告：高度重合',
                        text: `<p>您的回答显示出一种<span class="hl">显著的超常感知模式</span>。</p><p>在三十一道题目中，您对其中<span class="hl">${yesCount}道</span>给出了肯定回应，比例明显高于一般人群。</p><p>这一结果更像是一种“敏感型”画像：您更容易捕捉到日常中的边缘细节、模糊记忆和不易定位的异常感受。</p><p>这不必然意味着它们真的存在，但说明您有更高的“感知敏锐度”。</p>`,
                        foot: '建议将这些感受记录下来，并观察它们是否有固定的时间、地点或人。'
                    };
                }
                if (yesCount >= 16) {
                    return {
                        title: '检测报告：显著偏移',
                        text: `<p>您的回答呈现出<span class="hl">明显的感知偏移</span>，共有${yesCount}道题目得到肯定回应。</p><p>您似乎比多数人更容易注意到那些边缘、短促、难以定位来源的体验。</p><p>${maybeCount > 5 ? `另外有${maybeCount}道题您选择了“似乎有过”，这进一步放大了这种倾向。` : ''}</p><p>这更像是对细节的高度敏感，而不一定是客观异常。</p>`,
                        foot: '建议把这些体验分门别类记录，避免将偶发感受过度泛化。'
                    };
                }
                if (yesCount >= 6) {
                    return {
                        title: '检测报告：轻度敏感',
                        text: `<p>您的回答显示出<span class="hl">轻度的感知敏感性</span>，共有${yesCount}道题目得到肯定回应。</p><p>整体上仍是常见范围，您只是比一般人更容易注意到一些不太稳定的细微体验。</p><p>${maybeCount >= 8 ? `您还有${maybeCount}道题选择了“似乎有过”，说明您的判断本身就带有一定的模糊性。` : ''}</p><p>这通常代表观察力较好、联想能力稍强，未必指向异常。`,
                        foot: '保持现状即可，继续关注日常中的真实线索。'
                    };
                }
                return {
                    title: '检测报告：常规范围',
                    text: `<p>您的回答处于<span class="hl">常规感知范围</span>内，仅有${yesCount}道题目获得肯定回应。</p><p>这说明您的日常感知较为稳定，较少被模糊、边缘的异常体验牵动。</p><p>${refuseCount >= 2 ? `您还有${refuseCount}道题选择了“不愿回答”，这表明您在面对某些议题时比较保守。` : ''}</p><p>如果没有持续、明确的异常体验，现有结果已经足够可靠。</p>`,
                    foot: '当前结论基本稳定，继续保持观察即可。'
                };
            }

            const resultPreambles = [
                {
                    title: '（旧档案）侵蚀记录已开启',
                    text: `<p>纸面上的黑色开始向里渗透。</p><p>不是随机的污点，而是<span class="hl">曾被反复书写、反复阅读、反复记住的痕迹</span>。</p><p>它们在边缘聚集，在空白处扩散，像某种没有名字的手在展开。</p><p>当你读完最后一行时，答案已经不再只是答案。</p><p><span class="hl fade-w">四秒后，结论会重新归位。</span></p>`,
                    foot: '—— 旧档案总是先用恐惧提醒你，它仍然在阅读 ——'
                },
                {
                    title: '（旧档案）重新归档',
                    text: `<p>你在看到这页时，像是被人替你补了一次笔记。</p><p>不是新的答案，而是<span class="hl">被重新命名的旧留存</span>。</p><p>某些段落已经被换掉了，某些词则被保留成了暗号。</p><p>你可以继续往下看，但你也可能会发现自己正在读一份被"修正"过的记录。</p><p><span class="hl fade-w">四秒后，结果会以更平静的方式出现。</span></p>`,
                    foot: '—— 记忆并不总是自己留下的，它也会被别人替你整理 ——'
                },
                {
                    title: '（旧档案）边缘校正',
                    text: `<p>页面上的裂纹并没有消失，只是变得更顺。</p><p>像是有人在缝补空白，用<span class="hl">更温和的文字</span>把尖锐的部分遮住。</p><p>你看见的不是纯粹的结论，而是某个存在刻意保留的版本。</p><p>它希望你相信这就是最终的样子。</p><p><span class="hl fade-w">四秒后，真正的检测报告会浮现。</span></p>`,
                    foot: '—— 这份记录不是为了安抚你，而是为了让你读得更久 ——'
                },
                {
                    title: '（旧档案）空白回声',
                    text: `<p>空白处有回声，像是从纸背传出来的低语。</p><p>你以为自己在阅读答案，实际上却在<span class="hl">追踪一段被人为压低的叙述</span>。</p><p>它不直接说出真相，只在边角留下轻微的褶皱。</p><p>你越往下读，越像是在对一份自己并不完全记得的笔记做补全。</p><p><span class="hl fade-w">四秒后，报告会把信息重新拼回正确的位置。</span></p>`,
                    foot: '—— 有些文字不是为了被理解，而是为了让你继续看下去 ——'
                }
            ];

            function showResult() {
                const yesCount = Object.values(answers).filter(v => v === 'yes').length;
                const maybeCount = Object.values(answers).filter(v => v === 'maybe').length;
                const refuseCount = Object.values(answers).filter(v => v === 'refuse').length;
                const preamble = resultPreambles[Math.floor(Math.random() * resultPreambles.length)];

                resultArea.classList.add('on');
                resultArea.style.display = 'block';
                resultArea.style.opacity = '1';
                resultArea.style.visibility = 'visible';
                progLine.style.width = '100%';
                resultTitle.textContent = preamble.title;
                resultText.innerHTML = preamble.text;
                resultFoot.textContent = preamble.foot;
                window.scrollTo({ top: 0, behavior: 'auto' });

                setTimeout(() => {
                    const summary = buildNormalSummary(yesCount, maybeCount, refuseCount);
                    resultTitle.textContent = summary.title;
                    resultText.innerHTML = summary.text;
                    resultFoot.textContent = summary.foot;
                    requestAnimationFrame(() => {
                        const targetTop = resultArea.getBoundingClientRect().top + window.scrollY - 12;
                        window.scrollTo({ top: targetTop, behavior: 'smooth' });
                    });
                }, 4200);
            }

            const headerTitle = document.querySelector('header h1');
            if (headerTitle) {
                headerTitle.style.opacity = '0';
                headerTitle.style.transition = 'opacity 2.8s ease';
                setTimeout(() => { headerTitle.style.opacity = '1'; }, 400);
            }

            document.addEventListener('dblclick', e => {
                if (e.target.closest('.opt-btn') || e.target.closest('.nav-btn') || e.target.closest('.prog-dot')) {
                    e.preventDefault();
                }
            });

            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', e => {
                    const x = e.clientX / window.innerWidth;
                    const y = e.clientY / window.innerHeight;
                    const blurLayer = document.querySelector('.vignette-overlay');
                    if (blurLayer && !resultArea.classList.contains('on')) {
                        blurLayer.style.transform = `translate(${(x - 0.5) * 6}px, ${(y - 0.5) * 6}px)`;
                    }
                }, { passive: true });
            }

            (function scheduleGlitch() {
                if (resultArea.classList.contains('on')) return;
                const delay = Math.random() * 18000 + 12000;
                setTimeout(() => {
                    if (!resultArea.classList.contains('on') && document.visibilityState === 'visible' && !isTrans) {
                        document.body.classList.add('paper-rip');
                        setTimeout(() => document.body.classList.remove('paper-rip'), 600);
                    }
                    scheduleGlitch();
                }, delay);
            })();

            renderQuestion(0);
            updateDots();
            updateProgLine();
            updateNav();
        })();
    </script>
</body>
</html>
